name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=fiche_de_paie
          TARGET=${{ matrix.target }}
          ARCHIVE=${BIN}-${GITHUB_REF_NAME}-${TARGET}.tar.gz
          cp target/${TARGET}/release/${BIN} ${BIN}
          tar czf ${ARCHIVE} ${BIN}
          echo "ASSET=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $BIN = "fiche_de_paie"
          $TARGET = "${{ matrix.target }}"
          $ARCHIVE = "$BIN-$env:GITHUB_REF_NAME-$TARGET.zip"
          Copy-Item "target/$TARGET/release/$BIN.exe" "$BIN.exe"
          Compress-Archive -Path "$BIN.exe" -DestinationPath $ARCHIVE
          echo "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}